# code: language=ansible
---
- name: Clean up trento components
  hosts: trento_server
  become: true
  tasks:
    - name: Clean up Trento Web
      ansible.builtin.import_role:
        name: web
        tasks_from: cleanup

    - name: Clean up Trento Wanda
      ansible.builtin.import_role:
        name: wanda
        tasks_from: cleanup

    - name: Clean up Trento support plugin
      ansible.builtin.import_role:
        name: supportutils
        tasks_from: cleanup

    - name: Clean up Proxy
      ansible.builtin.import_role:
        name: rproxy
        tasks_from: cleanup

    - name: Clean up Firewall
      ansible.builtin.import_role:
        name: firewall
      vars:
        firewall_ports:
          - "{{ rproxy_vhost_http_listen_port }}/tcp"
          - "{{ rproxy_vhost_https_listen_port }}/tcp"
        firewall_state: disabled

- name: Clean up postgres
  hosts: postgres_hosts
  become: true
  tasks:
    - name: Postgres
      ansible.builtin.import_role:
        name: postgres
        tasks_from: cleanup

- name: Clean up rabbitmq
  hosts: rabbitmq_hosts
  become: true
  tasks:
    - name: Rabbitmq
      ansible.builtin.import_role:
        name: rabbitmq
        tasks_from: cleanup

- name: Prometheus cleanup
  hosts: prometheus_hosts
  become: true
  tasks:
    - name: Prometheus
      ansible.builtin.import_role:
        name: prometheus
        tasks_from: cleanup

    - name: Clean up Firewall
      ansible.builtin.import_role:
        name: firewall
      vars:
        firewall_ports:
          - "{{ prometheus_port }}/tcp"
        firewall_state: disabled

- name: Clean up Trento MCP Server
  hosts: "{{ ((groups['mcp_hosts'] | default([])) | length > 0) | ternary('mcp_hosts', 'trento_server') }}"
  become: true
  tasks:
    - name: Clean up Trento MCP Server
      ansible.builtin.import_role:
        name: mcp_server
        tasks_from: cleanup

    - name: Close Trento MCP Server listener firewall port
      ansible.builtin.import_role:
        name: firewall
      vars:
        firewall_ports:
          - "{{ trento_mcp_listen_port }}/tcp"
        firewall_state: disabled
      when:
        - (inventory_hostname not in (groups['trento_server'] | default([]))) or not (provision_proxy | bool)

    - name: Close Trento MCP Server health firewall port
      ansible.builtin.import_role:
        name: firewall
      vars:
        firewall_ports:
          - "{{ trento_mcp_health_port }}/tcp"
        firewall_state: disabled
      when: mcp_server_health_enabled | bool
