# code: language=ansible
---
- name: Clean up Trento MCP Server
  hosts: "{{ ((groups['mcp_hosts'] | default([])) | length > 0) | ternary('mcp_hosts', 'trento_server') }}"
  become: true
  tasks:
    - name: Clean up Trento MCP Server
      ansible.builtin.import_role:
        name: mcp_server
        tasks_from: cleanup

    - name: Close Trento MCP Server listener firewall port
      ansible.builtin.import_role:
        name: firewall
      vars:
        firewall_ports:
          - "{{ trento_mcp_listen_port }}/tcp"
        firewall_state: disabled
      when:
        - (inventory_hostname not in (groups['trento_server'] | default([]))) or not (provision_proxy | bool)

    - name: Close Trento MCP Server health firewall port
      ansible.builtin.import_role:
        name: firewall
      vars:
        firewall_ports:
          - "{{ trento_mcp_health_port }}/tcp"
        firewall_state: disabled
      when: mcp_server_health_enabled | bool

- name: Reconfigure reverse proxy after Trento MCP Server cleanup
  hosts: trento_server
  become: true
  roles:
    - role: trento
      run_once: true
      when: provision_proxy | bool
      vars:
        trento_postgres_host_group: "{{ 'postgres_hosts' if (provision_postgres | bool) else '' }}"
        trento_rabbitmq_host_group: "{{ 'rabbitmq_hosts' if (provision_rabbitmq | bool) else '' }}"
        trento_prometheus_host_group: "{{ 'prometheus_hosts' if (provision_prometheus | bool) else '' }}"
        trento_mcp_host_group: ""

    - role: rproxy
      when: provision_proxy | bool
      vars:
        rproxy_provision_prometheus: "{{ provision_prometheus | bool }}"
        rproxy_provision_mcp_server: false
