# code: language=ansible
---
- name: Install nginx
  when: rproxy_install | bool
  community.general.zypper:
    name:
      - nginx
    state: present
    update_cache: true

- name: Create the SSL certificate and key
  no_log: true
  ansible.builtin.copy:
    content: "{{ (item.content | b64decode) if item.base64 else item.content }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - content: "{{ rproxy_ssl_cert }}"
      dest: "/etc/ssl/certs/trento.crt"
      base64: "{{ rproxy_ssl_cert_as_base64 | bool }}"
    - content: "{{ rproxy_ssl_key }}"
      dest: "/etc/ssl/private/trento.key"
      base64: "{{ rproxy_ssl_key_as_base64 | bool }}"

- name: Override default reverse proxy config
  when: rproxy_override_default_conf | bool
  ansible.builtin.template:
    src: "nginx-default.conf.j2"
    dest: "{{ rproxy_conf_base_dir }}/nginx.conf"
    owner: "{{ rproxy_os_user }}"
    group: "{{ rproxy_os_group }}"
    mode: "0644"
  vars:
    conf_folder: "{{ rproxy_conf_dir }}"
    vhost_folder: "{{ rproxy_vhost_dir }}"
  notify:
    - Restart nginx

- name: Validate Prometheus auth configuration
  when: rproxy_provision_prometheus | bool
  ansible.builtin.assert:
    that:
      - rproxy_prometheus_auth in ["basic", "none"]
    fail_msg: >-
      trento_prometheus_auth (or rproxy_prometheus_auth) must be set to "basic" or "none" when Prometheus is enabled.
      Set it to "basic" and provide credentials, or to "none" to explicitly allow unauthenticated access.

- name: Validate Prometheus basic auth credentials
  when:
    - rproxy_provision_prometheus | bool
    - rproxy_prometheus_auth == "basic"
  ansible.builtin.assert:
    that:
      - rproxy_prometheus_auth_username | length > 0
      - rproxy_prometheus_auth_password | length > 0
    fail_msg: >-
      rproxy_prometheus_auth_username and rproxy_prometheus_auth_password must be provided
      when rproxy_prometheus_auth is set to "basic".

- name: Generate Prometheus htpasswd file
  when:
    - rproxy_provision_prometheus | bool
    - rproxy_prometheus_auth == "basic"
  no_log: true
  ansible.builtin.copy:
    content: "{{ rproxy_prometheus_auth_username }}:{{ rproxy_prometheus_auth_password | password_hash('bcrypt') }}"
    dest: /etc/nginx/prometheus.htpasswd
    owner: root
    group: nginx
    mode: "0640"
  notify:
    - Restart nginx

- name: Configure web project
  ansible.builtin.template:
    src: "trento.conf.j2"
    dest: "{{ rproxy_conf_base_dir }}/{{ rproxy_vhost_dir }}/{{ rproxy_vhost_filename }}.conf"
    owner: "{{ rproxy_os_user }}"
    group: "{{ rproxy_os_group }}"
    mode: "0644"
  vars:
    server_name: "{{ rproxy_server_name }}"
    web_port: "{{ rproxy_web_listen_port }}"
    wanda_port: "{{ rproxy_wanda_listen_port }}"
    http_listen_port: "{{ rproxy_vhost_http_listen_port }}"
    https_listen_port: "{{ rproxy_vhost_https_listen_port }}"
    web_upstream: "{{ rproxy_web_upstream_name }}"
    wanda_upstream: "{{ rproxy_wanda_upstream_name }}"
    wanda_location: "{{ rproxy_wanda_location }}"
    prometheus_upstream: "{{ rproxy_prometheus_upstream_name }}"
  notify:
    - Restart nginx

- name: Start nginx service
  ansible.builtin.service:
    name: "{{ rproxy_os_service }}"
    state: started
    enabled: true
