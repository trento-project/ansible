name: CI

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "VERSION"
  pull_request:
    paths-ignore:
      - "VERSION"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ansible-lint:
    name: Playbook linting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.TRENTOBOT_SSH_KEY }}

      - uses: apache/skywalking-eyes/header@61275cc80d0798a405cb070f7d3a8aaf7cf2c2c1 # v0.8.0
        name: Check license headers

      - name: Run ansible-lint on main playbook
        uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c # v26.4.0

      - name: List available collections
        run: |
          ansible-galaxy collection list

      - name: Run ansible-lint on devbox playbook
        uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c # v26.4.0
        with:
          setup_python: false
          working_directory: "./devbox/ansible"
          requirements_file: "./requirements.yml"

      - name: List available collections
        run: |
          ansible-galaxy collection list

  test-deploy:
    name: Run ansible${{ matrix.control_node.ansible_version }} on ${{ matrix.install_method }}/${{ matrix.target.label }}
    needs: [ansible-lint]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        control_node:
          - ansible_version: "11"
            target_python: python3.11
          - ansible_version: "9"
            target_python: python3
        install_method: ["rpm", "docker"]
        target:
          - label: SLES15-SP7
            host_var: TEST_SP7_HOST_IP
          - label: SLES15-SP6
            host_var: TEST_SP6_HOST_IP
          - label: SLES15-SP5
            host_var: TEST_SP5_HOST_IP
          - label: SLES15-SP4
            host_var: TEST_SP4_HOST_IP
          - label: SLES16.0
            host_var: TEST_SLES16_HOST_IP
            target_python: python3

        exclude:
          - target:
              label: SLES15-SP4
              host_var: TEST_SP4_HOST_IP
            control_node:
              ansible_version: "11"
              target_python: python3.11

          - target:
              label: SLES15-SP5
              host_var: TEST_SP5_HOST_IP
            control_node:
              ansible_version: "11"
              target_python: python3.11

    env:
      TEST_HOST_IP: ${{ vars[matrix.target.host_var] }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.TRENTOBOT_SSH_KEY }}

      - name: Install Ansible
        run: sudo pipx install --force --include-deps "ansible~=${{ matrix.control_node.ansible_version }}.0"

      - name: Install galaxy deps
        run: ansible-galaxy install -r requirements.yml

      - name: Run playbook
        id: runplaybook
        uses: dawidd6/action-ansible-playbook@126642a1c6ce512da255ef2b41e8ee90f0077474 # v9
        with:
          playbook: playbook.yml
          key: ${{ secrets.SSH_MACHINE_KEY }}
          inventory: |
            all:
              vars:
                ansible_user: ${{ secrets.TEST_HOST_USER }}
                ansible_python_interpreter: /usr/bin/${{ matrix.target.target_python || matrix.control_node.target_python }}
              children:
                trento_server:
                  hosts:
                    server:
                      ansible_host: ${{ env.TEST_HOST_IP }}
                postgres_hosts:
                  hosts:
                    server:
                      ansible_host: ${{ env.TEST_HOST_IP }}
                rabbitmq_hosts:
                  hosts:
                    server:
                      ansible_host: ${{ env.TEST_HOST_IP }}
                prometheus_hosts:
                  hosts:
                    server:
                      ansible_host: ${{ env.TEST_HOST_IP }}
                agents:
                  hosts:
                    agent:
                      ansible_host: ${{ env.TEST_HOST_IP }}
          options: |
            --extra-vars "web_postgres_password='trento' \
            wanda_postgres_password='wanda' \
            rabbitmq_password='trento' \
            prometheus_url='http://localhost' \
            trento_server_name='trento-deployment.example.com' \
            web_admin_password='adminpassword' \
            enable_api_key='false' \
            nginx_vhost_listen_port='443' \
            nginx_ssl_cert_as_base64='true' \
            nginx_ssl_key_as_base64='true' \
            nginx_ssl_cert='${{ secrets.SSL_CERT }}' \
            nginx_ssl_key='${{ secrets.SSL_KEY }}' \
            agent_server_ca_cert='${{ secrets.SERVER_CA_CERT }}' \
            agent_server_ca_cert_as_base64='true' \
            install_method='${{ matrix.install_method }}'
            trento_prometheus_auth='basic'
            trento_prometheus_auth_username='prometheus'
            trento_prometheus_auth_password='prometheus-password'"
            --verbose

      - name: Test readiness
        run: curl -k "https://${{ env.TEST_HOST_IP }}/api/readyz"

      - name: Run playbook cleanup
        uses: dawidd6/action-ansible-playbook@126642a1c6ce512da255ef2b41e8ee90f0077474 # v9
        if: success() || steps.runplaybook.conclusion == 'failure'
        with:
          playbook: playbook.cleanup.yml
          key: ${{ secrets.SSH_MACHINE_KEY }}
          inventory: |
            all:
              vars:
                ansible_user: ${{ secrets.TEST_HOST_USER }}
                ansible_python_interpreter: /usr/bin/${{ matrix.target.target_python || matrix.control_node.target_python }}
              children:
                trento_server:
                  hosts:
                    server:
                      ansible_host: ${{ env.TEST_HOST_IP }}
                postgres_hosts:
                  hosts:
                    server:
                      ansible_host: ${{ env.TEST_HOST_IP }}
                rabbitmq_hosts:
                  hosts:
                    server:
                      ansible_host: ${{ env.TEST_HOST_IP }}
                prometheus_hosts:
                  hosts:
                    server:
                      ansible_host: ${{ env.TEST_HOST_IP }}
          options: |
            --extra-vars "web_postgres_password='trento' \
            wanda_postgres_password='wanda' \
            rabbitmq_password='trento' \
            prometheus_url='http://localhost' \
            trento_server_name='trento-deployment.example.com' \
            web_admin_password='adminpassword' \
            enable_api_key='false' \
            nginx_vhost_listen_port='443' \
            nginx_ssl_cert_as_base64='true' \
            nginx_ssl_key_as_base64='true' \
            nginx_ssl_cert='${{ secrets.SSL_CERT }}' \
            nginx_ssl_key='${{ secrets.SSL_KEY }}' \
            install_method='${{ matrix.install_method }}'"
            --verbose

  publish-containers:
    name: Publish GHCR Containers
    if: github.event_name == 'push'
    needs:
      - ansible-lint
      - test-deploy
    uses: trento-project/.github/.github/workflows/publish-containers.yaml@7ea6a8a1c3ed8a1f2185328219be4a724dd3686e # v1.8.0
    with:
      image_name: ansible
      tag: rolling
      dockerfile: "docker/Dockerfile"
    secrets:
      gh_token: ${{ secrets.TRENTOBOT_GH_PAT }}
      ssh_key: ${{ secrets.TRENTOBOT_SSH_KEY }}

  obs-sync:
    name: Update obs packages
    if: fromJSON(vars.OBS_ENABLED) && github.event_name == 'push'
    needs:
      - ansible-lint
      - test-deploy
    uses: trento-project/.github/.github/workflows/obs-sync.yaml@7ea6a8a1c3ed8a1f2185328219be4a724dd3686e # v1.8.0
    with:
      obs_project: ${{ vars.OBS_PROJECT_ROLLING }}
      obs_package: ${{ vars.OBS_PACKAGE }}
    secrets:
      gh_token: ${{ secrets.TRENTOBOT_GH_PAT }}
      obs_user: ${{ secrets.OBS_USER }}
      obs_pass: ${{ secrets.OBS_PASS }}
      obs_ssh_key: ${{ secrets.OBS_SSH_KEY }}
