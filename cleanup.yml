# code: language=ansible
---
- name: Clean up trento components
  hosts: trento_server
  become: true
  tasks:
    - name: Clean up Trento Web
      ansible.builtin.import_role:
        name: web
        tasks_from: cleanup

    - name: Clean up Trento Wanda
      ansible.builtin.import_role:
        name: wanda
        tasks_from: cleanup

    - name: Clean up Trento support plugin
      ansible.builtin.import_role:
        name: supportutils

    - name: Clean up Proxy
      ansible.builtin.import_role:
        name: rproxy
        tasks_from: cleanup

    - name: Clean up Firewall
      ansible.builtin.import_role:
        name: firewall
      vars:
        firewall_ports:
          - "{{ rproxy_vhost_http_listen_port }}/tcp"
          - "{{ rproxy_vhost_https_listen_port }}/tcp"
        firewall_state: disabled

- name: Clean up postgres
  hosts: postgres_hosts
  become: true
  tasks:
    - name: Postgres
      ansible.builtin.import_role:
        name: postgres
        tasks_from: cleanup

- name: Clean up rabbitmq
  hosts: rabbitmq_hosts
  become: true
  tasks:
    - name: Rabbitmq
      ansible.builtin.import_role:
        name: rabbitmq
        tasks_from: cleanup

- name: Prometheus cleanup
  hosts: prometheus_hosts
  become: true
  tasks:
    - name: Prometheus
      ansible.builtin.import_role:
        name: prometheus
        tasks_from: cleanup

    - name: Clean up Firewall
      ansible.builtin.import_role:
        name: firewall
      vars:
        firewall_ports:
          - "{{ prometheus_port }}/tcp"
        firewall_state: disabled

- name: Clean up Trento MCP Server on dedicated MCP hosts
  hosts: "{{ ((groups['mcp_hosts'] | default([])) | length > 0) | ternary('mcp_hosts', 'localhost') }}"
  gather_facts: "{{ (groups['mcp_hosts'] | default([])) | length > 0 }}"
  become: true
  tasks:
    - name: Clean up Trento MCP Server
      ansible.builtin.import_role:
        name: mcp_server
        tasks_from: cleanup
      when: (groups['mcp_hosts'] | default([])) | length > 0

- name: Clean up Trento MCP Server on Trento server hosts
  hosts: "{{ (((groups['mcp_hosts'] | default([])) | length == 0) and ((groups['trento_server'] | default([])) | length > 0))
             | ternary('trento_server', 'localhost') }}"
  gather_facts: "{{ ((groups['mcp_hosts'] | default([])) | length == 0) and ((groups['trento_server'] | default([])) | length > 0) }}"
  become: true
  tasks:
    - name: Clean up Trento MCP Server
      ansible.builtin.import_role:
        name: mcp_server
        tasks_from: cleanup
      when:
        - (groups['mcp_hosts'] | default([])) | length == 0
        - (groups['trento_server'] | default([])) | length > 0
